runConfig:
  minInstances: 0
  memoryMiB: 1024
  cpu: 1

env:
  - variable: EXE_ENV
    value: 'dev'
  - variable: APP_URL
    value: 'https://TODO_YOUR_APP_HOSTING_URL'
  - variable: NEXT_PUBLIC_APP_URL
    value: 'https://TODO_YOUR_APP_HOSTING_URL'
    availability:
      - BUILD
      - RUNTIME
  - variable: APP_STORE_URL
    value: 'TODO_YOUR_APP_STORE_URL'
  - variable: APNS_BUNDLE_ID
    value: 'com.example.exe.dev'
  - variable: GOOGLE_CLOUD_PROJECT
    value: 'your-project-dev'
  - variable: SENDGRID_FROM_EMAIL
    value: 'noreply@example.com'
  - variable: GEMINI_MODEL
    value: 'gemini-3.1-flash-lite'
  - variable: GEMINI_LATEST_INFO_MODEL
    value: 'gemini-2.5-pro'
  - variable: SLACK_APP_ID
    value: 'TODO_YOUR_SLACK_APP_ID'
  - variable: SLACK_CLIENT_ID
    value: 'TODO_YOUR_SLACK_CLIENT_ID'
  - variable: LIVEKIT_AGENT_NAME
    value: 'exe-task-review-agent'
  - variable: LIVEKIT_ROOM_NAME_PREFIX
    value: 'exe-dev-'
  - variable: LIVEKIT_WS_URL
    value: 'wss://TODO_YOUR_LIVEKIT_DOMAIN'
  - variable: NEXT_PUBLIC_LIVEKIT_WS_URL
    value: 'wss://TODO_YOUR_LIVEKIT_DOMAIN'
    availability:
      - BUILD
      - RUNTIME
  - variable: VM_INSTANCE_NAME
    value: 'exe-livekit-dev'
  - variable: VM_PROJECT
    value: 'your-project-dev'
  - variable: VM_ZONE
    value: 'asia-northeast1-b'
  - variable: LIVEKIT_VM_IDLE_GRACE_MINUTES
    value: '10'

  - variable: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY
  - variable: SLACK_CLIENT_SECRET
    secret: SLACK_CLIENT_SECRET
  - variable: SLACK_SIGNING_SECRET
    secret: SLACK_SIGNING_SECRET
  - variable: GBRAIN_ROUTER_ADMIN_TOKEN
    secret: GBRAIN_ROUTER_ADMIN_TOKEN
  - variable: SENDGRID_API_KEY
    secret: SENDGRID_API_KEY
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: LIVEKIT_API_KEY
    secret: LIVEKIT_API_KEY
  - variable: LIVEKIT_API_SECRET
    secret: LIVEKIT_API_SECRET
  - variable: APNS_TEAM_ID
    secret: APNS_TEAM_ID
  - variable: APNS_KEY_ID
    secret: APNS_KEY_ID
  - variable: APNS_AUTH_KEY
    secret: APNS_AUTH_KEY
